version: "3.9"

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  bootstrap:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    logging: *default-logging
    env_file:
      - .env
    environment:
      BOOTSTRAP_ONLY: "true"
      RISK_DATASET_FILE: /app/data/risk/risk-dataset.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./infrastructure/scripts/bootstrap-api.sh"]

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    logging: *default-logging
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/api/v1/system/readiness').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    command: ["pnpm", "--filter", "@whyyo/api", "start"]

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    logging: *default-logging
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    command: ["pnpm", "--filter", "@whyyo/worker", "start"]

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    logging: *default-logging
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    command: ["pnpm", "--filter", "@whyyo/web", "start"]

volumes:
  postgres-data:
  redis-data:
